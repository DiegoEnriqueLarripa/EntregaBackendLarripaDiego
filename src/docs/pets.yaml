paths:
  /api/pets:
    get:
      summary: Obtener todas las mascotas
      responses:
        200:
          description: Lista de mascotas obtenida exitosamente
    post:
      summary: Crear una nueva mascota
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                specie: { type: string }
                birthDate: { type: string }
      responses:
        201:
          description: Mascota creada exitosamente
  /api/pets/withimage:
    post:
      summary: Crear mascota con imagen (Multer)
      description: Endpoint para subir una mascota junto con su foto.
      responses:
        201:
          description: Mascota con imagen creada